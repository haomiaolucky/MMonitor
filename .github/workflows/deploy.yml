name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push to ACR
        run: |
          az acr build --registry cab10936d165acr --image mmonitor:${{ github.sha }} --image mmonitor:latest --file Dockerfile . --no-logs

      - name: Deploy to Container Apps
        run: |
          az containerapp update --name mmonitor --resource-group mmonitor-rg --image cab10936d165acr.azurecr.io/mmonitor:${{ github.sha }}